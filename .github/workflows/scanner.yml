name: Challenge Hunter Scanner
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
      - name: Run scanner
        env:
          DB_PATH: ${{ github.workspace }}/opportunities.db
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          cd src
          python seed.py
          python scanner.py --github-actions
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opportunities.db || true
          git commit -m "chore: scanner results $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || true
          git push
      - name: Upload DB artefact
        uses: actions/upload-artifact@v4
        with:
          name: opportunities-db
          path: opportunities.db
          retention-days: 7
