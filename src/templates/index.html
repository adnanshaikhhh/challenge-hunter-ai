<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }} v{{ version }} — Autonomous Opportunity Hunter</title>
  <meta name="description" content="{{ tagline }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- =====================  Sidebar  ===================== -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="mark">⚡</div>
        <div>
          <div class="name">Challenge Hunter</div>
          <div class="version">v{{ version }}</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard"><span class="icon">🎯</span> Dashboard</button>
        <button class="nav-item" data-view="high"><span class="icon">🔥</span> High Priority</button>
        <button class="nav-item" data-view="approved"><span class="icon">✅</span> Approved</button>
        <button class="nav-item" data-view="building"><span class="icon">🔨</span> Building</button>
        <button class="nav-item" data-view="submitted"><span class="icon">🏆</span> Submitted</button>
        <button class="nav-item" data-view="analytics"><span class="icon">📊</span> Analytics</button>
        <button class="nav-item" data-view="settings"><span class="icon">⚙️</span> Settings</button>
      </nav>
      <div class="sidebar-footer">
        <span class="status-dot" id="live-dot"></span>
        <span id="last-scan-text">live</span>
      </div>
    </aside>

    <!-- =====================  Main  ===================== -->
    <main class="main">
      <div class="topbar">
        <h1 id="page-title">Dashboard</h1>
        <div class="spacer"></div>
        <input id="search-input" class="search-input" placeholder="Search opportunities…" />
        <button class="btn btn-primary" id="scan-btn">⚡ Scan Now</button>
      </div>

      <!-- Stats row -->
      <div class="stat-row" id="stat-row"></div>

      <!-- Dashboard view -->
      <div id="dashboard-view">
        <div class="filter-bar">
          <div class="pill-group">
            <button class="pill active" data-status-pill="all">All</button>
            <button class="pill" data-status-pill="pending">Pending</button>
            <button class="pill" data-status-pill="approved">Approved</button>
            <button class="pill" data-status-pill="building">Building</button>
            <button class="pill" data-status-pill="high">High Score</button>
          </div>
          <div class="tag-chips">
            <span class="tag-chip" data-tag="ai">#ai</span>
            <span class="tag-chip" data-tag="web3">#web3</span>
            <span class="tag-chip" data-tag="grants">#grants</span>
            <span class="tag-chip" data-tag="hackathon">#hackathon</span>
            <span class="tag-chip" data-tag="bounty">#bounty</span>
          </div>
          <div class="spacer" style="flex:1"></div>
          <select id="sort-select" class="search-input" style="width:auto;">
            <option value="score">Sort: Score</option>
            <option value="ev">Sort: Expected Value</option>
            <option value="prize">Sort: Prize</option>
            <option value="deadline">Sort: Deadline</option>
            <option value="win">Sort: Win %</option>
          </select>
          <div class="pill-group" style="padding:3px;">
            <button class="pill active" data-layout="grid" onclick="setLayout('grid')">▦ Grid</button>
            <button class="pill" data-layout="list" onclick="setLayout('list')">☰ List</button>
          </div>
          <span id="result-count" style="font-size:12px; color:var(--text-muted);"></span>
        </div>

        <div class="card-grid" id="card-grid"></div>

        <div class="list-view" id="list-view">
          <table class="list-table" id="list-table">
            <thead>
              <tr>
                <th>Name</th><th>Prize</th><th>Deadline</th>
                <th>Score</th><th>Win %</th><th>AI Policy</th><th>Source</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Analytics view -->
      <div id="analytics-view" style="display:none;">
        <div id="analytics-root"></div>
      </div>

      <!-- Settings view -->
      <div id="settings-view" style="display:none;">
        <div id="settings-root"></div>
      </div>
    </main>
  </div>

  <!-- =====================  Modal  ===================== -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-sidebar" id="modal-sidebar"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <script src="/static/app.js"></script>
</body>
</html>
