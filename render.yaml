services:
  - type: web
    name: challenge-hunter-ai
    env: python
    plan: free
    rootDir: src
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SCAN_INTERVAL_HOURS
        value: 4
      - key: MIN_SCORE_FOR_ALERT
        value: 70
